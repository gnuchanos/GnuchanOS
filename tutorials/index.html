<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GnuchanOS Tutorials</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: #150825;
    color: #eee;
  }
  .app-wrapper { display: flex; height: 100vh; overflow: hidden; }

  /* ===== SIDEBAR ===== */
  .sidebar {
    width: 250px; min-width: 250px;
    background: #1a0c30; border-right: 3px solid #2d1554;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .sidebar-header {
    padding: 16px 14px 10px; border-bottom: 2px solid #2d1554; text-align: center;
  }
  .sidebar-header h2 { font-size: 1.2em; color: #a855f7; font-weight: 700; }
  .sidebar-header .sub { font-size: 0.72em; color: #7c3aed; margin-top: 2px; }
  .sidebar-nav { flex: 1; overflow-y: auto; padding: 6px 0; }
  .sidebar-nav::-webkit-scrollbar { width: 5px; }
  .sidebar-nav::-webkit-scrollbar-track { background: #150825; }
  .sidebar-nav::-webkit-scrollbar-thumb { background: #3b1d6e; border-radius: 4px; }
  .sidebar-link {
    display: block; padding: 8px 14px 8px 18px; text-decoration: none; color: #c4b5fd;
    font-size: 0.85em; border-left: 3px solid transparent;
    transition: background 0.12s, border-color 0.12s, color 0.12s; cursor: pointer;
  }
  .sidebar-link:hover { background: #2d1554; color: #eee; }
  .sidebar-link.active { background: #2d1554; border-left-color: #a855f7; color: #fff; font-weight: 600; }
  .sidebar-link .num { color: #7c3aed; font-weight: 600; font-size: 0.8em; display: inline-block; width: 20px; }
  .sidebar-link .lbl { display: inline; }
  .sidebar-footer { padding: 10px 14px; border-top: 2px solid #2d1554; font-size: 0.7em; color: #6b21a8; text-align: center; }

  /* ===== MAIN ===== */
  .main-area {
    flex: 1; overflow-y: auto; padding: 20px 24px; min-width: 0;
  }
  .main-area::-webkit-scrollbar { width: 7px; }
  .main-area::-webkit-scrollbar-track { background: #150825; }
  .main-area::-webkit-scrollbar-thumb { background: #3b1d6e; border-radius: 4px; }

  /* ===== LANGUAGE TABS ===== */
  .lang-tabs {
    display: flex; gap: 4px; margin-bottom: 16px; padding: 0 4px;
  }
  .lang-tab {
    flex: 1; padding: 16px; text-align: center; border-radius: 12px 12px 0 0;
    background: #1a1030; border: 2px solid #2d1554; border-bottom: none;
    cursor: pointer; font-size: 1.2em; font-weight: 700; transition: all 0.15s;
    color: #7c3aed; letter-spacing: 1px;
  }
  .lang-tab:hover { background: #2d1554; color: #c4b5fd; }
  .lang-tab.active { background: #1f0d3a; color: #a855f7; border-color: #a855f7; transform: translateY(-2px); }
  .lang-tab .icon { font-size: 0.7em; display: block; margin-bottom: 2px; }

  /* ===== CONTENT STYLES ===== */
  .container {
    max-width: 960px; margin: 0 auto;
    background: #1f0d3a; border: 3px solid #2d1554; border-radius: 14px;
    padding: 24px 28px;
  }
  .container h1 { color: #a855f7; font-size: 2em; margin-bottom: 8px; }
  .container h2 { color: #c084fc; font-size: 1.4em; margin: 22px 0 8px; border-bottom: 2px solid #0f3460; padding-bottom: 4px; }
  .container h3 { color: #d8b4fe; margin: 14px 0 6px; }
  .container p, .container li { line-height: 1.6; color: #ddd; font-size: 1em; }
  .container ul, .container ol { padding-left: 24px; margin: 8px 0; }
  .container li { margin: 4px 0; }
  .container pre, .container .code {
    background: #0a0a1a; color: #50fa7b; font-family: 'Courier New', monospace;
    padding: 14px 18px; border-radius: 10px; border: 2px solid #2d1554;
    margin: 10px 0; overflow-x: auto; font-size: 1.05em; line-height: 1.5;
    white-space: pre-wrap; overflow-wrap: break-word;
  }
  .container .code .cmt { color: #6272a4; }
  .container .code .kw  { color: #ff79c6; }
  .container .code .fn  { color: #50fa7b; }
  .container .code .str { color: #f1fa8c; }
  .container .code .num { color: #bd93f9; }
  .container .code .pre { color: #8be9fd; }
  .container .code .type { color: #66d9ef; }
  .container .output {
    background: #0a0a1a; color: #f1fa8c; font-family: 'Courier New', monospace;
    padding: 10px 16px; border-radius: 8px; border: 2px solid #a855f7;
    margin: 8px 0 18px; white-space: pre-wrap; overflow-wrap: break-word;
    font-size: 1.05em; line-height: 1.5;
  }
  .container .output::before { content: "▶ OUTPUT"; display: block; color: #50fa7b; font-size: 0.8em; margin-bottom: 4px; }
  .container .note { background: #1a1030; border-left: 4px solid #7c3aed; padding: 10px 14px; margin: 10px 0; border-radius: 6px; font-size: 0.95em; }
  .container .warn { background: #2a1020; border-left: 4px solid #e74c3c; padding: 10px 14px; margin: 10px 0; border-radius: 6px; font-size: 0.95em; }
  .container .tip { background: #1a1030; border-left: 4px solid #8b5cf6; padding: 10px 14px; margin: 10px 0; border-radius: 6px; font-size: 0.95em; }
  .container table { width: 100%; border-collapse: collapse; margin: 10px 0; }
  .container th { background: #2d1554; color: #c084fc; padding: 7px 10px; text-align: left; border: 1px solid #3b1d6e; }
  .container td { padding: 7px 10px; border: 1px solid #3b1d6e; color: #ddd; overflow-wrap: break-word; }

  /* ===== GRID ===== */
  .subtitle { text-align: center; color: #c4b5fd; font-size: 1em; margin-bottom: 24px; }
  .lesson-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }
  .lesson-card {
    background: #2d1554; border-radius: 10px; padding: 12px 16px;
    text-decoration: none; color: #eee;
    transition: transform 0.15s, background 0.15s;
    border: 2px solid transparent; cursor: pointer; display: block;
  }
  .lesson-card:hover { background: #3b1d6e; transform: translate(-2px, -2px); border-color: #a855f7; }
  .lesson-card .num { color: #a855f7; font-weight: bold; font-size: 0.8em; }
  .lesson-card .title { font-size: 1em; font-weight: 600; display: block; margin: 3px 0; }
  .lesson-card .desc { display: block; font-size: 0.78em; color: #c4b5fd; line-height: 1.3; }
  .tag { display: inline-block; padding: 2px 7px; border-radius: 8px; font-size: 0.85em; margin-top: 3px; }
  .tag-beginner { background: #7c3aed; color: #fff; }
  .tag-intermediate { background: #a855f7; color: #fff; }
  .tag-advanced { background: #6d28d9; color: #fff; }
  .tag-library { background: #0e7490; color: #fff; }

  /* ===== WELCOME ===== */
  .welcome { text-align: center; padding: 40px 20px; }
  .welcome h1 { font-size: 2.8em; margin-bottom: 10px; }
  .welcome p { font-size: 1.2em; color: #c4b5fd; margin-bottom: 30px; }
  .welcome-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 20px; }
  .welcome-card {
    background: #2d1554; border-radius: 14px; padding: 30px 20px; cursor: pointer;
    border: 3px solid transparent; transition: all 0.2s; text-align: center;
  }
  .welcome-card:hover { background: #3b1d6e; border-color: #a855f7; transform: translateY(-4px); }
  .welcome-card .big-icon { font-size: 3.5em; display: block; margin-bottom: 12px; }
  .welcome-card h3 { color: #a855f7; font-size: 1.5em; margin-bottom: 8px; }
  .welcome-card p { color: #c4b5fd; font-size: 0.9em; margin: 0; }

  @media (max-width: 768px) {
    .sidebar { width: 180px; min-width: 180px; }
    .sidebar-link { font-size: 0.9em; padding: 6px 10px 6px 14px; }
    .main-area { padding: 12px 14px; }
    .container { padding: 16px 18px; }
    .welcome-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="app-wrapper">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header" id="sidebar-header">
      <h2>📚 GnuchanOS</h2>
      <div class="sub">Tutorials</div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">GnuchanOS &bull; Tutorials</div>
  </aside>

  <main class="main-area" id="main-content">
    <div class="lang-tabs" id="lang-tabs"></div>
    <div class="container" id="content-area">
      <!-- populated dynamically -->
    </div>
  </main>
</div>
<script src="tutorial.js"></script>
</body>
</html>
