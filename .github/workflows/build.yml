name: Build GCL

on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Build compiler
        shell: bash
        run: |
          cd language
          mkdir -p build
          SOURCES=$(find src -name "*.c" | tr '\n' ' ')

          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            EXE="build/gcl.exe"
          else
            EXE="build/gcl"
          fi

          gcc -std=c11 -Wall -Wextra -O2 \
            -I src -I src/types -I src/common -I src/frontend -I src/backend \
            $SOURCES -o "$EXE"
          echo "BINARY=$EXE" >> $GITHUB_ENV

      - name: Verify binary
        shell: bash
        run: ls -la language/${{ env.BINARY }}

      - name: Test — version
        shell: bash
        run: language/${{ env.BINARY }} -version

      - name: Test — help
        shell: bash
        run: language/${{ env.BINARY }} -help

      - name: Test — lexer
        shell: bash
        run: |
          printf '#define FOO 42\n#debug "hello" FOO\n' > /tmp/test.gcsf
          language/${{ env.BINARY }} -lexer /tmp/test.gcsf

      - name: Test — parser
        shell: bash
        run: |
          printf '#define FOO 42\n#debug "hello" FOO\n' > /tmp/test.gcsf
          language/${{ env.BINARY }} -parser /tmp/test.gcsf

      - name: Test — AST
        shell: bash
        run: |
          printf '#define FOO 42\n#debug "hello" FOO\n' > /tmp/test.gcsf
          language/${{ env.BINARY }} -ast /tmp/test.gcsf

      - name: Test — IR dump
        shell: bash
        run: |
          printf '#define FOO 42\n#debug "hello" FOO\n' > /tmp/test.gcsf
          language/${{ env.BINARY }} -ir /tmp/test.gcsf

      - name: Test — codegen
        shell: bash
        run: |
          printf '#define FOO 42\n#debug "hello" FOO\n' > /tmp/test.gcsf
          language/${{ env.BINARY }} -codegen /tmp/test.gcsf

      - name: Test — export (-o)
        shell: bash
        run: |
          printf '#define FOO 42\n#debug "hello" FOO\n' > /tmp/test.gcsf
          language/${{ env.BINARY }} /tmp/test.gcsf -o /tmp/out

      - name: Test — flags passthrough
        shell: bash
        run: |
          printf '#define FOO 42\n#debug "hello" FOO\n' > /tmp/test.gcsf
          language/${{ env.BINARY }} -linclude inc1 -llib lib1 -lextend ext1 /tmp/test.gcsf -o /tmp/out2

      - name: Upload artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: gcl-linux-x86_64
          path: language/build/gcl
          if-no-files-found: error

      - name: Upload artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: gcl-windows-x86_64
          path: language/build/gcl.exe
          if-no-files-found: error
