name: Build GCL

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build compiler (auto-find all sources)
        run: |
          cd language
          mkdir -p build
          SOURCES=$(find src -name "*.c" | tr '\n' ' ')
          echo "Sources: $SOURCES"
          gcc -std=gnu99 -Wall -Wextra $SOURCES -I src -o build/gcl

      - name: Verify binary exists
        run: ls -la language/build/gcl && file language/build/gcl

      - name: Test — version
        run: language/build/gcl -version

      - name: Test — help
        run: language/build/gcl -help

      - name: Test — lexer pipeline
        run: |
          echo "int a = 5;" > /tmp/test.gcsf
          language/build/gcl -lexer /tmp/test.gcsf

      - name: Test — full pipeline
        run: |
          echo "int a = 5;" > /tmp/test2.gcsf
          language/build/gcl /tmp/test2.gcsf -o /tmp/out.c

      - name: Test — debug + multiple paths
        run: |
          echo "int x = 10;" > /tmp/test3.gcsf
          language/build/gcl -debug -linclude inc1 -linclude inc2 -llib lib -lextend ext /tmp/test3.gcsf -o /tmp/out2.c

      - name: Test — shell help/exit
        run: printf "help\nexit\n" | language/build/gcl || true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: gcl-linux-x86_64
          path: language/build/gcl
          if-no-files-found: error
