name: Build GCL
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build compiler (auto-find all sources)
        run: |
          cd language/src
          SOURCES=$(find . -name "*.c" | tr '\n' ' ')
          gcc -std=gnu99 -Wall -Wextra $SOURCES -o gcl
      - name: Test HEADERS
        run: cd language/src && ./gcl ../../_test_c_codes/real_test.gcsf -o /tmp/out.c && gcc /tmp/out.c -o /tmp/out && /tmp/out
      - name: Test #error
        run: cd language/src && ./gcl ../../_test_c_codes/headers_test.gcsf -o /tmp/out.c; test $? -eq 1
