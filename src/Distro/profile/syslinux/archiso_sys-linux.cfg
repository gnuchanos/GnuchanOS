LABEL gnuchanos
TEXT HELP
Boot the Gnuchanos live environment (BIOS).
ENDTEXT
MENU LABEL Gnuchanos live (%ARCH%, BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID%

LABEL gnuchanosspeech
TEXT HELP
Boot Gnuchanos live with speakup screen reader (BIOS).
ENDTEXT
MENU LABEL Gnuchanos live (%ARCH%, BIOS) with ^speech
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% accessibility=on
