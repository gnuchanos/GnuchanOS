# Picom config — GnuchanOS
# Window compositor with blur, shadow, rounded corners

# Shadow
shadow = true;
shadow-radius = 12;
shadow-offset-x = -10;
shadow-offset-y = -10;
shadow-opacity = 0.5;
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'dunst'",
  "_GTK_FRAME_EXTENTS@:c"
];

# Fading
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 10;

# Blur
blur-method = "dual_kawase";
blur-strength = 7;
blur-background = true;
blur-background-frame = true;
blur-background-fixed = false;
blur-kern = "3x3box";
blur: {
  strength = 7;
  method = "dual_kawase";
  background = true;
  background-frame = true;
  background-fixed = false;
};
blur-exclude = [
  "class_g = 'dmenu'"
];

# Opacity
opacity-rule = [
  "80:class_g = 'URxvt' && !_NET_WM_STATE@:32a",
  "90:class_g = 'Firefox' && !_NET_WM_STATE@:32a"
];

# Corners
corner-radius = 8;
round-borders = 2;
round-borders-exclude = [
  "class_g = 'dmenu'"
];

# Active window opacity
active-opacity = 1.0;
inactive-opacity = 0.9;
inactive-dim = 0.0;

# Backend
backend = "xrender";
vsync = true;

# Other
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
refresh-rate = 0;